<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Gladius Calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(201,168,76,0.15);
    --gold: #c9a84c;
    --gold-dim: #7a6229;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f0ede8;
    --muted: #9b9690;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  html, body {
    min-height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--mono); -webkit-font-smoothing: antialiased;
  }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { max-width: 480px; margin: 0 auto; padding: 0 16px 32px; }
  header {
    padding: 24px 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--display); font-weight: 800; font-size: 28px;
    letter-spacing: -1px; color: var(--gold);
  }
  .instrument-badge {
    font-size: 12px; padding: 6px 12px; border-radius: 6px;
    background: rgba(201,168,76,0.1); color: var(--gold);
    border: 1px solid var(--gold-dim);
  }
  .section { margin-bottom: 24px; }
  .section-head {
    font-size: 11px; letter-spacing: 1.2px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .field label {
    display: block; font-size: 10px; color: var(--muted);
    margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .field input, .field select {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 17px; width: 100%;
  }
  .dir-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .dir-btn {
    padding: 16px; border-radius: 12px; text-align: center;
    font-size: 15px; font-weight: 600; border: 1px solid var(--border);
  }
  .active-long { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .active-short { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
  .results {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 16px; overflow: hidden;
  }
  .result-main {
    padding: 20px; display: flex; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .result-value {
    font-family: var(--display); font-size: 36px; font-weight: 700;
    color: var(--gold); line-height: 1;
  }
  .result-value.lots { color: #fff; }
  .result-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .result-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 16px 20px; gap: 8px; border-top: 1px solid var(--border);
  }
  .mini-label { font-size: 10px; color: var(--muted); }
  .mini-val { font-size: 15px; font-weight: 500; }
  .rr-section {
    padding: 16px 20px; border-top: 1px solid var(--border);
  }
  .rr-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .rr-num { font-family: var(--display); font-size: 22px; font-weight: 700; color: var(--gold); }
  .reset-btn {
    width: 100%; background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 16px; border-radius: 12px; margin-top: 20px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">GLADIUS <span style="font-size:15px;color:#666;">pro</span></div>
    <div class="instrument-badge" id="instrumentBadge">XAU/USD</div>
  </header>

  <div class="section">
    <div class="section-head">Instrument</div>
    <div class="field">
      <select id="instrument" onchange="changeInstrument()">
        <option value="XAU">XAU/USD - Gold (100 oz)</option>
        <option value="XAG">XAG/USD - Silver (5000 oz)</option>
        <option value="EURUSD">EUR/USD</option>
        <option value="GBPUSD">GBP/USD</option>
        <option value="USDJPY">USD/JPY</option>
        <option value="BTC">BTC/USD</option>
        <option value="US30">US30 (Dow)</option>
        <option value="NAS100">NAS100</option>
        <option value="USOIL">USOIL (Crude)</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-head">Account</div>
    <div class="input-grid">
      <div class="field">
        <label>BALANCE ($)</label>
        <input type="number" id="balance" value="24843.75" inputmode="decimal" />
      </div>
      <div class="field">
        <label>RISK %</label>
        <input type="number" id="riskPct" value="1" step="0.1" inputmode="decimal" />
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">Direction</div>
    <div class="dir-toggle">
      <button class="dir-btn active-long" id="btnLong" onclick="setDir('long')">▲ Long</button>
      <button class="dir-btn" id="btnShort" onclick="setDir('short')">▼ Short</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">Trade Levels</div>
    <div class="input-grid">
      <div class="field"><label>ENTRY</label><input type="number" id="entry" value="4676" /></div>
      <div class="field"><label>STOP LOSS</label><input type="number" id="sl" value="4650" /></div>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>TAKE PROFIT (OPTIONAL)</label>
      <input type="number" id="tp" value="4840" />
    </div>
  </div>

  <div class="results">
    <div class="result-main">
      <div>
        <div style="font-size:11px;color:var(--muted);">AT RISK</div>
        <div class="result-value" id="dollarRisk">$249</div>
        <div class="result-sub" id="riskSub">1% of $24,843</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);">LOT SIZE</div>
        <div class="result-value lots" id="lotSize">0.10</div>
        <div class="result-sub">enter in GooeyPro</div>
      </div>
    </div>

    <div class="result-row">
      <div><div class="mini-label">SL DIST</div><div class="mini-val" id="slDist">26.0</div></div>
      <div><div class="mini-label">TP DIST</div><div class="mini-val" id="tpDist">164.0</div></div>
      <div><div class="mini-label">MAX GAIN</div><div class="mini-val" id="maxGain" style="color:var(--green);">+$1,573</div></div>
    </div>

    <div class="rr-section">
      <div class="rr-header">
        <span style="color:var(--muted);">RISK : REWARD</span>
        <span class="rr-num" id="rrNum">1 : 6.3</span>
      </div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetDefaults()">RESET TO DEFAULTS</button>
</div>

<script>
  let direction = 'long';
  let currentInstrument = 'XAU';

  const instruments = {
    XAU:    { name: "XAU/USD", valuePerPoint: 100,   decimals: 2 },
    XAG:    { name: "XAG/USD", valuePerPoint: 5000,  decimals: 3 },
    EURUSD: { name: "EUR/USD", valuePerPoint: 100000,decimals: 5 },
    GBPUSD: { name: "GBP/USD", valuePerPoint: 100000,decimals: 5 },
    USDJPY: { name: "USD/JPY", valuePerPoint: 100000,decimals: 3 },
    BTC:    { name: "BTC/USD", valuePerPoint: 1,     decimals: 2 },
    US30:   { name: "US30",    valuePerPoint: 1,     decimals: 2 },
    NAS100: { name: "NAS100",  valuePerPoint: 1,     decimals: 2 },
    USOIL:  { name: "USOIL",   valuePerPoint: 100,   decimals: 3 }
  };

  function g(id) { return parseFloat(document.getElementById(id).value) || 0; }

  function changeInstrument() {
    currentInstrument = document.getElementById('instrument').value;
    document.getElementById('instrumentBadge').textContent = instruments[currentInstrument].name;
    calc();
  }

  function setDir(d) {
    direction = d;
    document.getElementById('btnLong').classList.toggle('active-long', d === 'long');
    document.getElementById('btnShort').classList.toggle('active-short', d === 'short');
    calc();
  }

  function calc() {
    const balance = g('balance');
    const riskPct = g('riskPct');
    const entry = g('entry');
    const sl = g('sl');
    const tp = g('tp');

    const dollarRisk = balance * (riskPct / 100);
    const slDist = Math.abs(entry - sl);
    const tpDist = tp > 0 ? Math.abs(tp - entry) : 0;
    const inst = instruments[currentInstrument];

    const lots = slDist > 0 ? dollarRisk / (slDist * inst.valuePerPoint) : 0;
    const rr = tpDist > 0 ? tpDist / slDist : 0;
    const maxGain = lots * tpDist * inst.valuePerPoint;

    document.getElementById('dollarRisk').textContent = '$' + Math.round(dollarRisk);
    document.getElementById('riskSub').textContent = riskPct + '% of $' + balance.toLocaleString();
    document.getElementById('lotSize').textContent = lots.toFixed(2);
    document.getElementById('slDist').textContent = slDist.toFixed(inst.decimals);
    document.getElementById('tpDist').textContent = tpDist > 0 ? tpDist.toFixed(inst.decimals) : '—';
    document.getElementById('maxGain').textContent = tpDist > 0 ? '+$' + Math.round(maxGain) : '—';
    document.getElementById('rrNum').textContent = tpDist > 0 ? '1 : ' + rr.toFixed(1) : '—';
  }

  function resetDefaults() {
    document.getElementById('balance').value = 24843.75;
    document.getElementById('riskPct').value = 1;
    document.getElementById('entry').value = 4676;
    document.getElementById('sl').value = 4650;
    document.getElementById('tp').value = 4840;
    document.getElementById('instrument').value = 'XAU';
    changeInstrument();
  }

  ['balance','riskPct','entry','sl','tp'].forEach(id => {
    document.getElementById(id).addEventListener('input', calc);
  });

  // Initialize
  changeInstrument();
  calc();
</script>
</body>
</html>
