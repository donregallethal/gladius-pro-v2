<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gladius" />
<title>Gladius Calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* === Your original CSS (unchanged) === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12); --gold: #c9a84c; --gold-dim: #7a6229;
    --gold-glow: rgba(201,168,76,0.15); --green: #22c55e; --red: #ef4444;
    --text: #f0ede8; --muted: #6b6760; --muted2: #9b9690;
    --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); }
  body { min-height: 100svh; display: flex; flex-direction: column; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { flex: 1; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; width: 100%; padding: 0 20px 32px; }
  header { padding: 28px 0 20px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 0.5px solid var(--border); margin-bottom: 24px; }
  .logo { font-family: var(--display); font-weight: 800; font-size: 26px; letter-spacing: -0.5px; color: var(--gold); }
  .logo span { color: var(--muted2); font-weight: 400; font-size: 13px; font-family: var(--mono); letter-spacing: 0; margin-left: 8px; }
  .instrument-badge { font-size: 11px; font-family: var(--mono); color: var(--gold); background: var(--gold-glow); border: 0.5px solid var(--gold-dim); padding: 4px 10px; border-radius: 4px; letter-spacing: 0.08em; }
  .section { margin-bottom: 20px; }
  .section-head { font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; padding-left: 1px; }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s; }
  .field:focus-within { border-color: var(--gold-dim); }
  .field label { display: block; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .field input, .field select { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 16px; font-weight: 400; width: 100%; }
  .field input::-webkit-outer-spin-button, .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field select { cursor: pointer; }
  .field select option { background: #1a1a1a; }
  .dir-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .dir-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px; color: var(--muted2); font-family: var(--mono); font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .dir-btn.active-long { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.4); color: var(--green); }
  .dir-btn.active-short { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: var(--red); }
  .results { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .result-main { padding: 20px; border-bottom: 0.5px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .result-label { font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .result-value { font-family: var(--display); font-weight: 700; font-size: 32px; letter-spacing: -1px; color: var(--gold); line-height: 1; }
  .result-value.lots { color: var(--text); }
  .result-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .result-row { display: grid; grid-template-columns: repeat(3, 1fr); padding: 14px 20px; gap: 8px; }
  .mini-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .mini-val { font-size: 14px; font-weight: 500; }
  .mini-val.pos { color: var(--green); }
  .mini-val.neg { color: var(--red); }
  .rr-section { padding: 0 20px 16px; border-top: 0.5px solid var(--border); }
  .rr-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 8px; font-size: 11px; color: var(--muted); }
  .rr-header .rr-num { font-family: var(--display); font-weight: 700; font-size: 18px; color: var(--text); }
  .rr-track { height: 3px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .rr-fill { height: 3px; border-radius: 99px; background: var(--gold); transition: width 0.3s ease; }
  .warn-box { background: rgba(239,68,68,0.08); border: 0.5px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #f87171; display: none; margin-bottom: 12px; line-height: 1.5; }
  .reset-btn { width: 100%; background: transparent; border: 0.5px solid var(--border2); border-radius: 8px; padding: 14px; color: var(--muted2); font-family: var(--mono); font-size: 13px; cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; margin-top: 4px; }
  .footer { text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; padding-top: 16px; }
</style>
</head>
<body>

  <header>
    <div><div class="logo">GLADIUS<span>calc</span></div></div>
    <div class="instrument-badge" id="instrumentBadge">XAU/USD</div>
  </header>

  <div class="section">

        <option value="US30">US30 (Dow)</option>
        <option value="NAS100">NAS100</option>
        <option value="USOIL">USOIL (Crude)</option>
      </select>
    </div>
  </div>

  <!-- Rest of the HTML is the same as before (Account, Direction, Trade levels, Results, etc.) -->

      <div class="field"><label>Balance ($)</label><input type="number" id="balance" value="24507" inputmode="decimal" /></div>
      <div class="field"><label>Risk %</label><input type="number" id="riskPct" value="1" step="0.1" inputmode="decimal" /></div>

    <div class="section-head">Direction</div>

      <button class="dir-btn" id="btnShort" onclick="setDir('short')">▼ Short</button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">Trade levels</div>
    <div class="input-grid">
